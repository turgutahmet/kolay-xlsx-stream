name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before submitting:
        - Check existing issues to avoid duplicates
        - Make sure you're on the latest 2.2.x release
        - For security issues, see SECURITY.md instead

  - type: input
    id: version
    attributes:
      label: Package version
      description: What version of kolay/xlsx-stream are you using?
      placeholder: e.g. 2.2.2
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: e.g. 8.2.10
    validations:
      required: true

  - type: input
    id: laravel
    attributes:
      label: Laravel version (if applicable)
      placeholder: e.g. 11.0

  - type: dropdown
    id: sink
    attributes:
      label: Which sink are you using?
      options:
        - FileSink (local file)
        - S3MultipartSink (direct S3)
        - StreamSink (custom)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Provide a minimal code sample that reproduces the issue.
        Use ```php fences.
      render: php
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message / stack trace
      description: Full stack trace if applicable.
      render: shell

  - type: textarea
    id: data-shape
    attributes:
      label: Data characteristics
      description: |
        How many rows? How many columns? Any unusual data
        (control bytes, multi-byte UTF-8, large strings)?
